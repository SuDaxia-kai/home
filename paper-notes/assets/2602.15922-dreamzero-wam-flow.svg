<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box { rx: 14; ry: 14; stroke-width: 2; }
      .txt { font-family: Arial, sans-serif; font-size: 18px; fill: #1f2937; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .line { stroke: #333; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="700" y="56" class="title" text-anchor="middle">DreamZero (WAM) 主流程</text>

  <rect class="box" x="60" y="250" width="250" height="130" fill="#e3f2fd" stroke="#1565c0"/>
  <text class="txt" x="185" y="300">输入</text>
  <text class="txt" x="185" y="330">语言 c + 视觉历史 o + 本体 q</text>

  <rect class="box" x="360" y="225" width="310" height="180" fill="#e8f5e9" stroke="#2e7d32"/>
  <text class="txt" x="515" y="285">联合 WAM 训练</text>
  <text class="txt" x="515" y="317">chunk-wise flow matching</text>
  <text class="txt" x="515" y="349">(视频 latent + 动作)</text>

  <rect class="box" x="720" y="250" width="260" height="130" fill="#fff8e1" stroke="#f9a825"/>
  <text class="txt" x="850" y="300">闭环推断</text>
  <text class="txt" x="850" y="330">KV cache + GT 观测替换</text>

  <rect class="box" x="1030" y="220" width="320" height="190" fill="#f3e5f5" stroke="#6a1b9a"/>
  <text class="txt" x="1190" y="280">加速栈</text>
  <text class="txt" x="1190" y="312">DreamZero-Flash + DiT caching</text>
  <text class="txt" x="1190" y="344">compile / quant / kernel</text>

  <rect class="box" x="430" y="520" width="560" height="150" fill="#ffebee" stroke="#c62828"/>
  <text class="txt" x="710" y="575">结果</text>
  <text class="txt" x="710" y="607">7 Hz 实时控制</text>
  <text class="txt" x="710" y="639">零样本泛化 + 跨 embodiment 迁移</text>

  <path class="line" d="M310 315 L360 315"/>
  <path class="line" d="M670 315 L720 315"/>
  <path class="line" d="M980 315 L1030 315"/>
  <path class="line" d="M515 405 L515 520"/>
  <path class="line" d="M1190 410 L1190 460 L830 460 L830 520"/>
</svg>
